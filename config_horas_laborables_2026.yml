# Configuración de ejemplo para Madrid 2026.
# Ajusta estas fechas según tu empresa o convenio.

jornada_intensiva:
  # En Madrid no existe un periodo universal obligatorio para todas las empresas.
  # Para este ejemplo se usa un esquema habitual: julio, agosto y septiembre.
  inicio: "2026-07-01"
  fin: "2026-09-30"

vacaciones:
  # Ejemplo: 30 días naturales consecutivos.
  # Este rango equivale a 30 días naturales, del 3 de agosto al 1 de septiembre de 2026 inclusive.
  rangos:
    - inicio: "2026-08-03"
      fin: "2026-09-01"
  dias_individuales: []

festivos:
  # Festivos oficiales de Madrid capital en 2026.
